version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: labor_connect_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: labor_connect
      MYSQL_USER: labor_user
      MYSQL_PASSWORD: labor_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: labor_connect_server
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=mysql://labor_user:labor_password@db:3306/labor_connect
      - JWT_SECRET=labor_connect_super_secret_key_123!
    restart: unless-stopped

volumes:
  db_data:
